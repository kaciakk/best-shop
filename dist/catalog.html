<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script type="module" src="/dist/js/catalog.js"></script>
    <link rel="stylesheet" href="/dist/css/main.css" />
  </head>
  <body>
    <header id="header" class="header"></header>
    <main>
      <section class="search-bar">
        <div class="container">
          <div class="search-bar__content">
            <div class="search-bar__left">
              <div id="show-result"></div>

              <div
                class="search-bar__input-field search-bar__input-field--sorting"
              >
                <svg id="filter-icon" class="search-bar__filter-icon">
                  <use href="/src/assets/icons/icons.svg#icon-filter"></use>
                </svg>
                <select id="select-sort" class="select search-bar__input">
                  <option value="default">Default Sorting</option>
                  <option value="price-asc">Price: Low to High</option>
                  <option value="price-desc">Price: High to Low</option>
                  <option value="popular">Most Popular</option>
                  <option value="rating">Top Rated</option>
                </select>
              </div>
            </div>
            <div class="search-bar__input-field">
              <svg class="search-bar__icon">
                <use href="/src/assets/icons/icons.svg#icon-search"></use>
              </svg>
              <input
                id="search-input"
                class="input search-bar__input"
                placeholder="Search Models"
              />
            </div>
          </div>
        </div>
      </section>
      <section id="filter" class="filter filter__hide">
        <div class="container">
          <div class="filter__content">
            <div class="filter__options">
              <div class="filter__select">
                <label
                  for="size"
                  class="text-body text-body--sm text-body--bold text-body--secondary"
                  >Size</label
                >
                <select id="size" class="select">
                  <option value="">Choose option</option>
                  <option value="S">S</option>
                  <option value="M">M</option>
                  <option value="L">L</option>
                  <option value="XL">XL</option>
                  <option value="SL">S-L</option>
                  <option value="SMXL">S, M, XL</option>
                </select>
              </div>
              <div class="filter__select">
                <label
                  for="size"
                  class="text-body text-body--sm text-body--bold text-body--secondary"
                  >Color</label
                >
                <select id="color" class="select">
                  <option value="">Choose option</option>
                  <option value="red">Red</option>
                  <option value="blue">Blue</option>
                  <option value="green">Green</option>
                  <option value="black">Black</option>
                  <option value="grey">Grey</option>
                  <option value="yellow">Yellow</option>
                  <option value="pink">Pink</option>
                </select>
              </div>
              <div class="filter__select">
                <label
                  for="size"
                  class="text-body text-body--sm text-body--bold text-body--secondary"
                  >Category</label
                >
                <select id="category" class="select">
                  <option value="">Choose option</option>
                  <option value="carry-ons">Carry-ons</option>
                  <option value="suitcases">Suitcases</option>
                  <option value="luggage sets">Luggage sets</option>
                  <option value="kids' luggage">Kids' luggage</option>
                </select>
              </div>
              <div class="filter__select">
                <label
                  for="sales"
                  class="text-body text-body--sm text-body--bold text-body--secondary"
                  >Sales</label
                >
                <div class="filter__select filter__select--radio">
                  <input
                    class="filter__radio"
                    type="radio"
                    name="sales"
                    id="sales"
                    value="sales"
                    switch
                  />
                </div>
              </div>
            </div>

            <div class="filter__buttons">
              <button id="clear-filters" class="button">CLEAR FILTERS</button>
              <button id="hide-filters" class="button">HIDE FILTERS</button>
            </div>
          </div>
        </div>
      </section>
      <section class="catalog">
        <div class="container">
          <div class="catalog__content">
            <div id="catalog__left" class="catalog__left"></div>
            <div id="catalog__right" class="catalog__right">
              <h5>Top Best Sets</h5>
              <div id="catalog__sets" class="catalog__sets"></div>
            </div>
          </div>
        </div>
      </section>
      <section class="pagination">
        <div class="container">
          <div class="pagination__content">
            <div class="pagination__left">
              <button id="button-prev-page" class="button button--pagination">
                <span class="text-body text-body--xs text-body--bold"
                  >&lt;</span
                >
                <span class="text-body text-body--xs text-body--bold"
                  >Prev</span
                >
              </button>

              <div id="buttons-pages" class="pagination__pages"></div>
              <button id="button-next-page" class="button button--pagination">
                <span class="text-body text-body--xs text-body--bold"
                  >Next</span
                >
                <span class="text-body text-body--xs text-body--bold"
                  >&gt;</span
                >
              </button>
            </div>
          </div>
        </div>
      </section>
      <section id="benefits" class="benefits"></section>
    </main>
    <footer id="footer" class="footer"></footer>
  </body>
</html>
